<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSight Auth</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="container-fluid auth-page">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-12 col-md-9 col-lg-7 col-xl-5">

            <div class="auth-card glow-card">
                <h1 class="brand-logo text-center">FinSight</h1>
                <p class="auth-subtitle text-center">
                    AI Powered Financial Intelligence
                </p>

                <div class="auth-tabs">
                    <button id="login-tab" class="tab-btn active">Login</button>
                    <button id="register-tab" class="tab-btn">Register</button>
                </div>

                <!-- LOGIN -->
                <form id="login-form">
                    <div class="mb-3">
                        <input id="login-email" type="email" class="form-control custom-input" placeholder="Email">
                    </div>

                    <div class="mb-3">
                        <input id="login-password" type="password" class="form-control custom-input" placeholder="Password">
                    </div>

                    <button type="submit" class="primary-btn auth-btn w-100">
                        Login
                    </button>
                </form>

                <!-- REGISTER -->
                <form id="register-form" class="d-none">
                    <div class="mb-2">
                        <input id="register-username" type="text" class="form-control custom-input" placeholder="Username">
                    </div>

                    <div class="row g-2">
                        <div class="col-6">
                            <input id="register-firstname" type="text" class="form-control custom-input" placeholder="First Name">
                        </div>

                        <div class="col-6">
                            <input id="register-lastname" type="text" class="form-control custom-input" placeholder="Last Name">
                        </div>
                    </div>

                    <div class="mt-2 mb-2">
                        <input id="register-email" type="email" class="form-control custom-input" placeholder="Email">
                    </div>

                    <div class="row g-2">
                        <div class="col-6">
                            <input id="register-password" type="password" class="form-control custom-input" placeholder="Password">
                        </div>

                        <div class="col-6">
                            <input id="register-confirm-password" type="password" class="form-control custom-input" placeholder="Confirm Password">
                        </div>
                    </div>

                    <button type="submit" class="primary-btn auth-btn w-100">
                        Register
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
